{% extends "base.html" %}
{% block content %}

<div class="step-icon" aria-hidden="true">
  <svg viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="23" stroke="#0078d4" stroke-width="2"/>
    <path d="M12 24a12 12 0 1024 0A12 12 0 0012 24z" stroke="#0078d4" stroke-width="2"/>
    <path d="M24 12v4M24 32v4M12 24h4M32 24h4" stroke="#0078d4" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="24" cy="24" rx="5" ry="12" stroke="#0078d4" stroke-width="1.5"/>
  </svg>
</div>

<h1 class="oobe-title">Region &amp; Language</h1>
<p class="oobe-subtitle">
  Choose your region and time zone so WebOS can personalise your experience.
</p>

<form method="post" action="{{ url_for('step_region') }}">
  <div class="form-group">
    <label class="form-label" for="region">Country or Region</label>
    <select id="region" name="region" class="form-select">
      <option value="en-US">United States</option>
      <option value="en-GB">United Kingdom</option>
      <option value="en-AU">Australia</option>
      <option value="en-CA">Canada</option>
      <option value="fr-FR">France</option>
      <option value="de-DE">Germany</option>
      <option value="ja-JP">Japan</option>
      <option value="zh-CN">China (Mainland)</option>
      <option value="en-IN">India</option>
      <option value="pt-BR">Brazil</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label" for="timezone">Time Zone</label>
    <select id="timezone" name="timezone" class="form-select">
      <option value="UTC">UTC ±0:00</option>
      <option value="America/New_York">Eastern Time (UTC−5)</option>
      <option value="America/Chicago">Central Time (UTC−6)</option>
      <option value="America/Denver">Mountain Time (UTC−7)</option>
      <option value="America/Los_Angeles">Pacific Time (UTC−8)</option>
      <option value="Europe/London">London (UTC+0/+1)</option>
      <option value="Europe/Paris">Paris (UTC+1/+2)</option>
      <option value="Asia/Tokyo">Tokyo (UTC+9)</option>
      <option value="Asia/Shanghai">Shanghai (UTC+8)</option>
      <option value="Australia/Sydney">Sydney (UTC+10/+11)</option>
    </select>
  </div>

  <div class="btn-row">
    <a href="{{ url_for('step_license') }}" class="btn btn-secondary">Back</a>
    <button type="submit" class="btn btn-primary">Next</button>
  </div>
</form>

{% endblock %}
