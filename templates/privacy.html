{% extends "base.html" %}
{% block content %}

<div class="step-icon" aria-hidden="true">
  <svg viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="23" stroke="#0078d4" stroke-width="2"/>
    <path d="M16 24a8 8 0 1016 0 8 8 0 00-16 0z" stroke="#0078d4" stroke-width="2"/>
    <circle cx="24" cy="24" r="3" fill="#0078d4"/>
    <path d="M24 14v4M24 30v4M14 24h4M30 24h4" stroke="#0078d4" stroke-width="2" stroke-linecap="round"/>
  </svg>
</div>

<h1 class="oobe-title">Privacy Settings</h1>
<p class="oobe-subtitle">
  Choose what optional data WebOS can collect to improve your experience.
  You can change these at any time in Settings.
</p>

<form method="post" action="{{ url_for('step_privacy') }}">
  <div class="privacy-group">

    <div class="privacy-item">
      <label class="toggle-label" for="diagnostics">
        <span class="toggle-text">
          <strong>Diagnostic &amp; usage data</strong>
          <span>Send crash reports and usage statistics to help improve WebOS.</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="diagnostics" name="diagnostics" class="toggle-input" checked />
          <span class="toggle-track" aria-hidden="true"></span>
        </span>
      </label>
    </div>

    <div class="privacy-item">
      <label class="toggle-label" for="location">
        <span class="toggle-text">
          <strong>Location services</strong>
          <span>Allow apps to use your precise location.</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="location" name="location" class="toggle-input" checked />
          <span class="toggle-track" aria-hidden="true"></span>
        </span>
      </label>
    </div>

  </div>

  <div class="btn-row">
    <a href="{{ url_for('step_region') }}" class="btn btn-secondary">Back</a>
    <button type="submit" class="btn btn-primary">Next</button>
  </div>
</form>

{% endblock %}
